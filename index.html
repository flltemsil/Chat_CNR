
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Chat_CNR | Bilgi Merkezi</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chat_CNR">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2593/2593635.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
        }
        #root {
            width: 100%;
            height: 100%;
        }
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #error-display {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #7f1d1d;
            color: #fecaca;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            display: none;
            z-index: 9999;
            word-break: break-all;
            border: 1px solid #991b1b;
        }

        /* Markdown Styles */
        .markdown-body {
            font-size: 14px;
            line-height: 1.6;
            color: inherit;
        }
        .markdown-body p { margin-bottom: 12px; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body code {
            background: rgba(255,255,255,0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background: #000;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
        }
        .markdown-body ul, .markdown-body ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body a {
            color: #3b82f6;
            text-decoration: underline;
        }
    </style>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.innerHTML = '<strong>Sistem Hatası:</strong> ' + msg + '<br><small>' + url + ' L:' + lineNo + '</small>';
            }
            return false;
        };
    </script>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "motion/react": "https://esm.sh/motion/react@^12.4.7",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.0",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0"
  }
}
</script>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div class="spinner"></div>
            <div style="color: #94a3b8; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;">Chat_CNR Hazırlanıyor</div>
        </div>
    </div>
    <div id="error-display"></div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered', reg))
                    .catch(err => console.log('Service Worker Registration Failed', err));
            });
        }
    </script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
