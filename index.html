
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat_CNR | Bilgi Merkezi</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    
    <!-- iOS Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chat_CNR">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2593/2593635.png">
    
    <!-- Windows Specific Meta Tags -->
    <meta name="msapplication-TileColor" content="#0a0a0a">
    <meta name="msapplication-TileImage" content="https://cdn-icons-png.flaticon.com/512/2593/2593635.png">
    <meta name="application-name" content="Chat_CNR">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            overflow: hidden;
            /* Prevent rubber band scrolling on iOS */
            position: fixed;
            -webkit-overflow-scrolling: touch;
        }
        #root {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* Handle iOS Safe Areas */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #error-display {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #7f1d1d;
            color: #fecaca;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            display: none;
            z-index: 9999;
            word-break: break-all;
            border: 1px solid #991b1b;
        }

        /* Markdown Styles */
        .markdown-body {
            font-size: 14px;
            line-height: 1.6;
            color: inherit;
        }
        .markdown-body p { margin-bottom: 12px; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body code {
            background: rgba(255,255,255,0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background: #000;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
        }
        .markdown-body ul, .markdown-body ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body a {
            color: #3b82f6;
            text-decoration: underline;
        }
    </style>
    <script>
        // Unregister any existing service workers to prevent caching issues
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error("Global Error:", msg, url, lineNo);
            var display = document.getElementById('error-display');
            if (display) {
                display.style.display = 'block';
                display.innerHTML = '<strong>Sistem Hatası:</strong> ' + msg + '<br><small>' + url + ' L:' + lineNo + '</small>';
            }
            return false;
        };

        function forceStart() {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = '<div style="padding: 20px; text-align: center; color: white;">' +
                    '<h2 style="color: #ef4444;">Sistem Başlatılamadı</h2>' +
                    '<p>React bileşeni yüklenirken bir sorun oluştu.</p>' +
                    '<button onclick="window.location.reload()" style="background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px;">Sayfayı Yenile</button>' +
                    '<p style="font-size: 10px; color: #666; margin-top: 20px;">Hata ayrıntıları için konsolu kontrol edin.</p>' +
                    '</div>';
            }
        }
    </script>
    <!-- Removed importmap to prevent ESM.sh conflicts in Vite environment -->
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <div class="spinner"></div>
            <div style="color: #94a3b8; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;">Chat_CNR Hazırlanıyor</div>
            <button onclick="forceStart()" style="margin-top: 20px; background: transparent; border: 1px solid #333; color: #666; font-size: 10px; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Yüklenmiyorsa Tıkla</button>
        </div>
    </div>
    <div id="error-display"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
